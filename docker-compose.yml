version: "3.9"

services:
  bot:
    build: .
    container_name: vpn_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on: []
    networks:
      - bot_network

  # Optional PostgreSQL (uncomment if you switch DATABASE_URL to postgres)
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: vpn_bot_db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: vpnbot
  #     POSTGRES_USER: vpnuser
  #     POSTGRES_PASSWORD: strongpassword
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - bot_network

networks:
  bot_network:
    driver: bridge

