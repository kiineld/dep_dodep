version: "3.9"

services:
  bot:
    build: .
    container_name: vpn_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: "Europe/Moscow"
    volumes:
      - ./data:/app/data          # SQLite DB + bot.log
      - ./assets:/app/assets:ro  # banner.jpg (read-only)
      - ./logs:/app/logs          # rotating logs
    networks:
      - bot_network

  # ── Optional PostgreSQL ──────────────────────────────────────────────────
  # Uncomment + change DATABASE_URL to postgresql+asyncpg://... in .env
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: vpn_bot_db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: vpnbot
  #     POSTGRES_USER: vpnuser
  #     POSTGRES_PASSWORD: strongpassword
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - bot_network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U vpnuser -d vpnbot"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

networks:
  bot_network:
    driver: bridge

